<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 400" role="img" aria-label="AgenticReality benchmark chart">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#b8b6ae"/>
    </pattern>
  </defs>
  <rect width="1400" height="400" fill="#f2f1ea"/>
  <rect width="1400" height="400" fill="url(#grid)"/>
  <rect x="20" y="20" width="1360" height="360" fill="none" stroke="#111111" stroke-width="2"/>

  <line x1="20" y1="62" x2="1380" y2="62" stroke="#111111" stroke-width="2"/>
  <text x="40" y="48" font-family="'JetBrains Mono', monospace" font-size="14" fill="#5f5c53" letter-spacing="2"> // AGENTRA_LABS: BENCHMARKS</text>
  <rect x="1318" y="36" width="8" height="8" fill="#ea580c"/>
  <text x="1336" y="48" font-family="'JetBrains Mono', monospace" font-size="12" fill="#5f5c53" letter-spacing="2">004</text>

  <text x="700" y="96" font-family="'JetBrains Mono', monospace" font-size="16" fill="#111111" font-weight="700" text-anchor="middle" letter-spacing="2">AgenticReality  ·  Criterion 0.5  ·  Apple M4 Pro  ·  Rust 1.90.0 --release</text>

  <!-- Bar chart: label x=46, bar start x=340, max bar width=820 (for 8.2ms) -->
  <!-- Initialize soul: 95 ns -->
  <text x="320" y="128" font-family="'JetBrains Mono', monospace" font-size="12" fill="#5f5c53" text-anchor="end">Initialize soul</text>
  <rect x="340" y="114" width="12" height="20" fill="#ea580c"/>
  <text x="360" y="128" font-family="'JetBrains Mono', monospace" font-size="12" fill="#111111">95 ns</text>

  <!-- Sense environment: 8.2 ms → 820 px -->
  <text x="320" y="162" font-family="'JetBrains Mono', monospace" font-size="12" fill="#5f5c53" text-anchor="end">Sense environment</text>
  <rect x="340" y="148" width="820" height="20" fill="#111111"/>
  <text x="1168" y="162" font-family="'JetBrains Mono', monospace" font-size="12" fill="#111111">  8.2 ms</text>

  <!-- Sense resources: 4.1 ms → 410 px -->
  <text x="320" y="196" font-family="'JetBrains Mono', monospace" font-size="12" fill="#5f5c53" text-anchor="end">Sense resources</text>
  <rect x="340" y="182" width="410" height="20" fill="#111111"/>
  <text x="758" y="196" font-family="'JetBrains Mono', monospace" font-size="12" fill="#111111">  4.1 ms</text>

  <!-- Create reality anchor: 280 ns → 28 px -->
  <text x="320" y="230" font-family="'JetBrains Mono', monospace" font-size="12" fill="#5f5c53" text-anchor="end">Create anchor</text>
  <rect x="340" y="216" width="28" height="20" fill="#ea580c"/>
  <text x="376" y="230" font-family="'JetBrains Mono', monospace" font-size="12" fill="#111111">280 ns</text>

  <!-- Verify claim: 1.4 ms → 140 px -->
  <text x="320" y="264" font-family="'JetBrains Mono', monospace" font-size="12" fill="#5f5c53" text-anchor="end">Verify claim (100 anchors)</text>
  <rect x="340" y="250" width="140" height="20" fill="#111111"/>
  <text x="488" y="264" font-family="'JetBrains Mono', monospace" font-size="12" fill="#111111">  1.4 ms</text>

  <!-- Hallucination check: 2.1 ms → 210 px -->
  <text x="320" y="298" font-family="'JetBrains Mono', monospace" font-size="12" fill="#5f5c53" text-anchor="end">Hallucination check</text>
  <rect x="340" y="284" width="210" height="20" fill="#ea580c"/>
  <text x="558" y="298" font-family="'JetBrains Mono', monospace" font-size="12" fill="#111111">  2.1 ms</text>

  <!-- Coherence check: 3.4 ms → 340 px -->
  <text x="320" y="332" font-family="'JetBrains Mono', monospace" font-size="12" fill="#5f5c53" text-anchor="end">Coherence check (7 domains)</text>
  <rect x="340" y="318" width="340" height="20" fill="#111111"/>
  <text x="688" y="332" font-family="'JetBrains Mono', monospace" font-size="12" fill="#111111">  3.4 ms</text>

  <!-- Write .areal: 6.3 ms → 630 px -->
  <text x="320" y="366" font-family="'JetBrains Mono', monospace" font-size="12" fill="#5f5c53" text-anchor="end">Write .areal</text>
  <rect x="340" y="352" width="630" height="20" fill="#111111"/>
  <text x="978" y="366" font-family="'JetBrains Mono', monospace" font-size="12" fill="#111111">  6.3 ms</text>
</svg>
