<svg viewBox="0 0 800 560" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="mcpGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a365d"/>
      <stop offset="100%" style="stop-color:#2c5282"/>
    </linearGradient>
    <linearGradient id="engineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d3748"/>
      <stop offset="100%" style="stop-color:#1a202c"/>
    </linearGradient>
    <linearGradient id="storageGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#553c9a"/>
      <stop offset="100%" style="stop-color:#6b46c1"/>
    </linearGradient>
    <linearGradient id="bridgeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#234e52"/>
      <stop offset="100%" style="stop-color:#285e61"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#a0aec0"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a365d">AgenticReality Architecture</text>
  <text x="400" y="46" text-anchor="middle" font-size="12" fill="#718096">Sister #10 -- The Ground</text>

  <!-- CLI Crate (top left) -->
  <rect x="30" y="62" width="140" height="40" rx="6" fill="#2b6cb0"/>
  <text x="100" y="87" text-anchor="middle" font-size="12" fill="white" font-weight="bold">CLI (areal)</text>

  <!-- FFI Crate (top right) -->
  <rect x="630" y="62" width="140" height="40" rx="6" fill="#2b6cb0"/>
  <text x="700" y="87" text-anchor="middle" font-size="12" fill="white" font-weight="bold">FFI (C ABI)</text>

  <!-- MCP Server Layer -->
  <rect x="50" y="120" width="700" height="70" rx="8" fill="url(#mcpGrad)"/>
  <text x="400" y="148" text-anchor="middle" font-size="15" fill="white" font-weight="bold">MCP SERVER (15 Tools)</text>
  <text x="400" y="168" text-anchor="middle" font-size="9" fill="#a0aec0">deployment | memory | environment | resource | capability | layer | anchor | hallucination | topology | temporal | stakes | coherence | context | ground | workspace</text>

  <!-- Arrows from CLI/FFI to MCP -->
  <path d="M100 102 L100 120" stroke="#a0aec0" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M700 102 L700 120" stroke="#a0aec0" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow MCP to Engine -->
  <path d="M400 190 L400 210" stroke="#a0aec0" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Reality Engine -->
  <rect x="50" y="210" width="700" height="180" rx="8" fill="url(#engineGrad)"/>
  <text x="400" y="235" text-anchor="middle" font-size="15" fill="white" font-weight="bold">REALITY ENGINE</text>

  <!-- Write Engine -->
  <rect x="70" y="248" width="140" height="30" rx="4" fill="#4a5568" stroke="#718096" stroke-width="1"/>
  <text x="140" y="268" text-anchor="middle" font-size="11" fill="white">Write Engine (~90 ops)</text>

  <!-- Query Engine -->
  <rect x="230" y="248" width="140" height="30" rx="4" fill="#4a5568" stroke="#718096" stroke-width="1"/>
  <text x="300" y="268" text-anchor="middle" font-size="11" fill="white">Query Engine (~78 ops)</text>

  <!-- Validation -->
  <rect x="590" y="248" width="140" height="30" rx="4" fill="#4a5568" stroke="#718096" stroke-width="1"/>
  <text x="660" y="268" text-anchor="middle" font-size="11" fill="white">Validation</text>

  <!-- Engine Components Row 1 -->
  <rect x="70" y="290" width="90" height="40" rx="4" fill="#4a5568"/>
  <text x="115" y="314" text-anchor="middle" font-size="10" fill="white">Deployment</text>

  <rect x="170" y="290" width="90" height="40" rx="4" fill="#4a5568"/>
  <text x="215" y="314" text-anchor="middle" font-size="10" fill="white">Environment</text>

  <rect x="270" y="290" width="90" height="40" rx="4" fill="#4a5568"/>
  <text x="315" y="314" text-anchor="middle" font-size="10" fill="white">Resource</text>

  <rect x="370" y="290" width="90" height="40" rx="4" fill="#4a5568"/>
  <text x="415" y="314" text-anchor="middle" font-size="10" fill="white">Reality</text>

  <rect x="470" y="290" width="90" height="40" rx="4" fill="#4a5568"/>
  <text x="515" y="314" text-anchor="middle" font-size="10" fill="white">Topology</text>

  <!-- Engine Components Row 2 -->
  <rect x="70" y="340" width="90" height="40" rx="4" fill="#4a5568"/>
  <text x="115" y="364" text-anchor="middle" font-size="10" fill="white">Temporal</text>

  <rect x="170" y="340" width="90" height="40" rx="4" fill="#4a5568"/>
  <text x="215" y="364" text-anchor="middle" font-size="10" fill="white">Stakes</text>

  <rect x="270" y="340" width="90" height="40" rx="4" fill="#4a5568"/>
  <text x="315" y="364" text-anchor="middle" font-size="10" fill="white">Coherence</text>

  <rect x="370" y="340" width="90" height="40" rx="4" fill="#4a5568"/>
  <text x="415" y="364" text-anchor="middle" font-size="10" fill="white">Hallucination</text>

  <rect x="470" y="340" width="90" height="40" rx="4" fill="#4a5568"/>
  <text x="515" y="364" text-anchor="middle" font-size="10" fill="white">Transition</text>

  <!-- Security -->
  <rect x="590" y="290" width="140" height="90" rx="4" fill="#744210" stroke="#d69e2e" stroke-width="1"/>
  <text x="660" y="318" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Security</text>
  <text x="660" y="335" text-anchor="middle" font-size="9" fill="#fefcbf">Auth + AuthZ</text>
  <text x="660" y="350" text-anchor="middle" font-size="9" fill="#fefcbf">Encryption</text>
  <text x="660" y="365" text-anchor="middle" font-size="9" fill="#fefcbf">Audit</text>

  <!-- Arrow Engine to Storage -->
  <path d="M400 390 L400 410" stroke="#a0aec0" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Storage Layer -->
  <rect x="50" y="410" width="700" height="60" rx="8" fill="url(#storageGrad)"/>
  <text x="400" y="435" text-anchor="middle" font-size="14" fill="white" font-weight="bold">STORAGE LAYER (.areal format)</text>
  <text x="400" y="455" text-anchor="middle" font-size="10" fill="#d6bcfa">Deployment | Environment | Resources | Reality | Topology | Temporal | Stakes | Coherence | Indexes</text>

  <!-- Arrow Storage to Bridges -->
  <path d="M400 470 L400 490" stroke="#a0aec0" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Sister Bridges -->
  <rect x="50" y="490" width="700" height="55" rx="8" fill="url(#bridgeGrad)"/>
  <text x="400" y="513" text-anchor="middle" font-size="14" fill="white" font-weight="bold">SISTER BRIDGES (9 traits + NoOp)</text>
  <text x="400" y="533" text-anchor="middle" font-size="10" fill="#81e6d9">Time | Contract | Identity | Memory | Cognition | Comm | Codebase | Vision | Hydra</text>
</svg>
