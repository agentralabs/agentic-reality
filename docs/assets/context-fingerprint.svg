<svg viewBox="0 0 650 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="fpGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d3748"/>
      <stop offset="100%" style="stop-color:#1a202c"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="325" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a365d">Context Fingerprint</text>
  <text x="325" y="50" text-anchor="middle" font-size="12" fill="#718096">A multi-dimensional hash of the complete operational context</text>

  <!-- Components feeding into fingerprint -->

  <!-- Deployment Hash -->
  <rect x="30" y="80" width="130" height="45" rx="6" fill="#3182ce"/>
  <text x="95" y="100" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Deployment</text>
  <text x="95" y="115" text-anchor="middle" font-size="9" fill="#bee3f8">hash [8 bytes]</text>

  <!-- Version Hash -->
  <rect x="180" y="80" width="130" height="45" rx="6" fill="#3182ce"/>
  <text x="245" y="100" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Version</text>
  <text x="245" y="115" text-anchor="middle" font-size="9" fill="#bee3f8">hash [8 bytes]</text>

  <!-- Environment Hash -->
  <rect x="330" y="80" width="130" height="45" rx="6" fill="#38a169"/>
  <text x="395" y="100" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Environment</text>
  <text x="395" y="115" text-anchor="middle" font-size="9" fill="#c6f6d5">hash [8 bytes]</text>

  <!-- Config Hash -->
  <rect x="480" y="80" width="130" height="45" rx="6" fill="#38a169"/>
  <text x="545" y="100" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Config</text>
  <text x="545" y="115" text-anchor="middle" font-size="9" fill="#c6f6d5">hash [8 bytes]</text>

  <!-- Resource Hash -->
  <rect x="30" y="145" width="130" height="45" rx="6" fill="#d69e2e"/>
  <text x="95" y="165" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Resource</text>
  <text x="95" y="180" text-anchor="middle" font-size="9" fill="#fefcbf">hash [8 bytes]</text>

  <!-- Capability Hash -->
  <rect x="180" y="145" width="130" height="45" rx="6" fill="#d69e2e"/>
  <text x="245" y="165" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Capability</text>
  <text x="245" y="180" text-anchor="middle" font-size="9" fill="#fefcbf">hash [8 bytes]</text>

  <!-- Temporal Hash -->
  <rect x="330" y="145" width="130" height="45" rx="6" fill="#dd6b20"/>
  <text x="395" y="165" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Temporal</text>
  <text x="395" y="180" text-anchor="middle" font-size="9" fill="#feebc8">hash [8 bytes]</text>

  <!-- Load Hash -->
  <rect x="480" y="145" width="130" height="45" rx="6" fill="#dd6b20"/>
  <text x="545" y="165" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Load</text>
  <text x="545" y="180" text-anchor="middle" font-size="9" fill="#feebc8">hash [8 bytes]</text>

  <!-- Network Hash -->
  <rect x="155" y="210" width="130" height="45" rx="6" fill="#805ad5"/>
  <text x="220" y="230" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Network</text>
  <text x="220" y="245" text-anchor="middle" font-size="9" fill="#e9d8fd">hash [8 bytes]</text>

  <!-- Dependency Hash -->
  <rect x="330" y="210" width="130" height="45" rx="6" fill="#805ad5"/>
  <text x="395" y="230" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Dependency</text>
  <text x="395" y="245" text-anchor="middle" font-size="9" fill="#e9d8fd">hash [8 bytes]</text>

  <!-- Arrows converging -->
  <line x1="95" y1="125" x2="325" y2="295" stroke="#a0aec0" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="245" y1="125" x2="325" y2="295" stroke="#a0aec0" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="395" y1="125" x2="325" y2="295" stroke="#a0aec0" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="545" y1="125" x2="325" y2="295" stroke="#a0aec0" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="95" y1="190" x2="325" y2="295" stroke="#a0aec0" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="245" y1="190" x2="325" y2="295" stroke="#a0aec0" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="395" y1="190" x2="325" y2="295" stroke="#a0aec0" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="545" y1="190" x2="325" y2="295" stroke="#a0aec0" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="220" y1="255" x2="325" y2="295" stroke="#a0aec0" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="395" y1="255" x2="325" y2="295" stroke="#a0aec0" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Combined Fingerprint -->
  <rect x="200" y="290" width="250" height="60" rx="10" fill="url(#fpGrad)" stroke="#a0aec0" stroke-width="2"/>
  <text x="325" y="315" text-anchor="middle" font-size="14" fill="white" font-weight="bold">BLAKE3 Fingerprint</text>
  <text x="325" y="335" text-anchor="middle" font-size="10" fill="#a0aec0">[32 bytes] -- a7f3b2c1d4e5f6a7...</text>

  <!-- Outputs -->
  <line x1="325" y1="350" x2="325" y2="380" stroke="#a0aec0" stroke-width="2"/>

  <!-- Shift Detection -->
  <rect x="30" y="380" width="180" height="50" rx="6" fill="#2d3748" stroke="#e53e3e" stroke-width="1"/>
  <text x="120" y="402" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Shift Detection</text>
  <text x="120" y="418" text-anchor="middle" font-size="9" fill="#fc8181">distance > threshold?</text>
  <line x1="325" y1="380" x2="120" y2="380" stroke="#a0aec0" stroke-width="1"/>

  <!-- Drift Tracking -->
  <rect x="235" y="380" width="180" height="50" rx="6" fill="#2d3748" stroke="#d69e2e" stroke-width="1"/>
  <text x="325" y="402" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Drift Tracking</text>
  <text x="325" y="418" text-anchor="middle" font-size="9" fill="#fefcbf">rate, direction, trend</text>

  <!-- Stability Analysis -->
  <rect x="440" y="380" width="180" height="50" rx="6" fill="#2d3748" stroke="#38a169" stroke-width="1"/>
  <text x="530" y="402" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Stability Analysis</text>
  <text x="530" y="418" text-anchor="middle" font-size="9" fill="#c6f6d5">volatility, expected duration</text>
  <line x1="325" y1="380" x2="530" y2="380" stroke="#a0aec0" stroke-width="1"/>

  <!-- Metadata -->
  <rect x="155" y="450" width="340" height="35" rx="6" fill="none" stroke="#4a5568" stroke-width="1"/>
  <text x="325" y="472" text-anchor="middle" font-size="10" fill="#718096">Captured at: timestamp | Stability: volatility (0-1) | Volatile components: [list]</text>
</svg>
