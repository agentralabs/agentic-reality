<svg viewBox="0 0 600 520" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="300" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a365d">The Seven Domains of Reality</text>

  <!-- Central Engine -->
  <circle cx="300" cy="260" r="55" fill="#2d3748" filter="url(#shadow)"/>
  <text x="300" y="253" text-anchor="middle" font-size="13" fill="white" font-weight="bold">REALITY</text>
  <text x="300" y="270" text-anchor="middle" font-size="13" fill="white" font-weight="bold">ENGINE</text>

  <!-- Domain 1: Deployment Consciousness (top center) -->
  <circle cx="300" cy="100" r="50" fill="#3182ce" filter="url(#shadow)"/>
  <text x="300" y="92" text-anchor="middle" font-size="10" fill="white" font-weight="bold">DEPLOYMENT</text>
  <text x="300" y="105" text-anchor="middle" font-size="9" fill="white">CONSCIOUSNESS</text>
  <text x="300" y="120" text-anchor="middle" font-size="8" fill="#bee3f8">"Where do I exist?"</text>

  <!-- Domain 2: Resource Proprioception (upper left) -->
  <circle cx="135" cy="155" r="50" fill="#38a169" filter="url(#shadow)"/>
  <text x="135" y="147" text-anchor="middle" font-size="10" fill="white" font-weight="bold">RESOURCE</text>
  <text x="135" y="160" text-anchor="middle" font-size="9" fill="white">PROPRIOCEPTION</text>
  <text x="135" y="175" text-anchor="middle" font-size="8" fill="#c6f6d5">"What do I have?"</text>

  <!-- Domain 3: Reality Physics (upper right) -->
  <circle cx="465" cy="155" r="50" fill="#d69e2e" filter="url(#shadow)"/>
  <text x="465" y="147" text-anchor="middle" font-size="10" fill="white" font-weight="bold">REALITY</text>
  <text x="465" y="160" text-anchor="middle" font-size="9" fill="white">PHYSICS</text>
  <text x="465" y="175" text-anchor="middle" font-size="8" fill="#fefcbf">"What is real?"</text>

  <!-- Domain 4: Topology Awareness (middle left) -->
  <circle cx="100" cy="300" r="50" fill="#805ad5" filter="url(#shadow)"/>
  <text x="100" y="292" text-anchor="middle" font-size="10" fill="white" font-weight="bold">TOPOLOGY</text>
  <text x="100" y="305" text-anchor="middle" font-size="9" fill="white">AWARENESS</text>
  <text x="100" y="320" text-anchor="middle" font-size="8" fill="#e9d8fd">"What surrounds me?"</text>

  <!-- Domain 5: Temporal Grounding (middle right) -->
  <circle cx="500" cy="300" r="50" fill="#dd6b20" filter="url(#shadow)"/>
  <text x="500" y="292" text-anchor="middle" font-size="10" fill="white" font-weight="bold">TEMPORAL</text>
  <text x="500" y="305" text-anchor="middle" font-size="9" fill="white">GROUNDING</text>
  <text x="500" y="320" text-anchor="middle" font-size="8" fill="#feebc8">"When am I?"</text>

  <!-- Domain 6: Stakes Perception (lower left) -->
  <circle cx="190" cy="410" r="50" fill="#e53e3e" filter="url(#shadow)"/>
  <text x="190" y="402" text-anchor="middle" font-size="10" fill="white" font-weight="bold">STAKES</text>
  <text x="190" y="415" text-anchor="middle" font-size="9" fill="white">PERCEPTION</text>
  <text x="190" y="430" text-anchor="middle" font-size="8" fill="#fed7d7">"What are the stakes?"</text>

  <!-- Domain 7: Coherence Maintenance (lower right) -->
  <circle cx="410" cy="410" r="50" fill="#319795" filter="url(#shadow)"/>
  <text x="410" y="402" text-anchor="middle" font-size="10" fill="white" font-weight="bold">COHERENCE</text>
  <text x="410" y="415" text-anchor="middle" font-size="9" fill="white">MAINTENANCE</text>
  <text x="410" y="430" text-anchor="middle" font-size="8" fill="#b2f5ea">"How do I stay grounded?"</text>

  <!-- Connection lines to center -->
  <line x1="300" y1="150" x2="300" y2="205" stroke="#a0aec0" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="172" y1="192" x2="258" y2="225" stroke="#a0aec0" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="428" y1="192" x2="342" y2="225" stroke="#a0aec0" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="145" y1="285" x2="248" y2="265" stroke="#a0aec0" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="455" y1="285" x2="352" y2="265" stroke="#a0aec0" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="222" y1="375" x2="275" y2="305" stroke="#a0aec0" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="378" y1="375" x2="325" y2="305" stroke="#a0aec0" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Legend -->
  <text x="300" y="500" text-anchor="middle" font-size="11" fill="#718096">7 domains, 26 inventions, ~90 write ops, ~78 query ops</text>
</svg>
